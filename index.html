<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TerraCore · Профиль</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0f0d;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .screen {
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .screen-hidden {
            opacity: 0; pointer-events: none; transform: translateY(8px);
            position: absolute; width: 100%; height: 100%;
        }
        .screen-visible {
            opacity: 1; pointer-events: auto; transform: translateY(0);
            position: relative; min-height: 100%;
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1a2320; border-radius: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #2d5a3f; border-radius: 8px; }
        .modal-overlay { background: rgba(10, 15, 13, 0.8); backdrop-filter: blur(8px); }
        .avatar-circle {
            width: 48px; height: 48px; border-radius: 50%;
            background: #2d5a3f; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 600; color: #e1f0e1; text-transform: uppercase;
        }
        .nav-btn-active { background: rgba(45, 90, 63, 0.25); color: #b1cfb1; }
        .btn-primary { background: #2d5a3f; transition: background 0.2s; }
        .btn-primary:hover { background: #3b6b4f; }
        .btn-login-dark { background: #1e3d2b; transition: background 0.2s; }
        .btn-login-dark:hover { background: #254f34; }
        /* Логотип TC */
        .logo-tc {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #b1cfb1 0%, #4a7a4a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 10px rgba(45, 90, 63, 0.6));
            position: relative;
            display: inline-block;
        }
        .logo-tc::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 5%;
            width: 90%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #2d5a3f, transparent);
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-[#0a0f0d] text-gray-200 h-screen flex flex-col overflow-hidden">

<div id="app" class="flex flex-col h-full w-full max-w-lg mx-auto relative bg-[#0a0f0d] shadow-2xl">

    <!-- Модальное окно -->
    <div id="modal-overlay" class="hidden fixed inset-0 z-30 flex items-center justify-center modal-overlay p-4">
        <div id="modal-content" class="bg-[#111b17] border border-[#2d5a3f]/40 rounded-2xl p-6 w-full max-w-sm shadow-2xl transition-all">
            <!-- динамически -->
        </div>
    </div>

    <main class="flex-1 relative overflow-y-auto custom-scroll pb-20" id="main-content">

        <!-- Главный экран (пустой, только шапка TC) -->
        <div id="home-screen" class="screen screen-visible flex flex-col h-full p-4 relative">
            <div class="absolute top-4 left-4 z-10 flex items-center select-none">
                <span class="logo-tc">TC</span>
            </div>
        </div>

        <!-- Профиль (все элементы строго вверху) -->
        <div id="profile-screen" class="screen screen-hidden flex flex-col h-full px-4 pb-4" style="padding-top: 0.5rem;">
            <div id="profile-gate" class="flex flex-col items-center space-y-2 mt-0">
                <div class="w-12 h-12 rounded-full bg-[#1a2320] flex items-center justify-center">
                    <span class="text-2xl text-[#2d5a3f]">◉</span>
                </div>
                <p class="text-xs text-gray-400 text-center px-4">Авторизуйтесь, чтобы увидеть профиль</p>
                <button id="profile-auth-btn"
                        class="w-full max-w-xs py-3 btn-primary text-white font-medium rounded-full active:scale-95 transition-transform shadow-lg text-sm">
                    Войти / Зарегистрироваться
                </button>
            </div>
            <div id="profile-authorized" class="hidden flex-col mt-1">
                <div class="flex items-center gap-4 mb-8">
                    <div id="profile-avatar" class="avatar-circle w-16 h-16 text-2xl"></div>
                    <div>
                        <p class="text-xl font-bold text-white" id="profile-display-name"></p>
                        <p class="text-sm text-gray-400" id="profile-username"></p>
                        <p class="text-xs text-gray-500" id="profile-email"></p>
                    </div>
                </div>
                <button id="logout-btn"
                        class="w-full py-3 bg-gray-800 hover:bg-gray-700 active:scale-95 text-gray-300 rounded-full transition">
                    Выйти из профиля
                </button>
            </div>
        </div>
    </main>

    <!-- Нижняя навигация -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-lg mx-auto bg-[#0d1411]/90 backdrop-blur-xl border-t border-[#2d5a3f]/30 flex justify-around py-2 z-20">
        <button id="tab-home" class="nav-btn flex flex-col items-center px-4 py-2 rounded-full transition active:scale-90 nav-btn-active">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
        </button>
        <button id="tab-profile" class="nav-btn flex flex-col items-center px-4 py-2 rounded-full transition active:scale-90 text-gray-400">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
        </button>
    </nav>
</div>

<script>
(function() {
    const STORAGE_USERS = 'app_users';
    const STORAGE_CURRENT_USER = 'app_current_user';

    let users = [];
    let currentUser = null;
    try {
        users = JSON.parse(localStorage.getItem(STORAGE_USERS) || '[]');
        currentUser = JSON.parse(localStorage.getItem(STORAGE_CURRENT_USER) || 'null');
    } catch(e) {
        users = [];
        currentUser = null;
    }

    const $ = (sel) => document.querySelector(sel);
    const homeScreen = $('#home-screen');
    const profileScreen = $('#profile-screen');
    const tabHome = $('#tab-home');
    const tabProfile = $('#tab-profile');
    const profileGate = $('#profile-gate');
    const profileAuthorized = $('#profile-authorized');
    const modalOverlay = $('#modal-overlay');
    const modalContent = $('#modal-content');

    function saveUsers() { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
    function saveCurrentUser() {
        if (currentUser) localStorage.setItem(STORAGE_CURRENT_USER, JSON.stringify(currentUser));
        else localStorage.removeItem(STORAGE_CURRENT_USER);
    }
    function getInitial(name) { return name ? name.charAt(0).toUpperCase() : '?'; }

    function updateAllUI() {
        const isAuth = !!currentUser;
        profileGate.classList.toggle('hidden', isAuth);
        profileAuthorized.classList.toggle('hidden', !isAuth);
        if (isAuth) {
            $('#profile-avatar').textContent = getInitial(currentUser.displayName);
            $('#profile-display-name').textContent = currentUser.displayName;
            $('#profile-username').textContent = '@' + currentUser.username;
            $('#profile-email').textContent = currentUser.email;
        }
    }

    function showTab(tab) {
        const isHome = tab === 'home';
        homeScreen.classList.toggle('screen-hidden', !isHome);
        homeScreen.classList.toggle('screen-visible', isHome);
        profileScreen.classList.toggle('screen-hidden', isHome);
        profileScreen.classList.toggle('screen-visible', !isHome);
        tabHome.classList.toggle('nav-btn-active', isHome);
        tabHome.classList.toggle('text-gray-400', !isHome);
        tabProfile.classList.toggle('nav-btn-active', !isHome);
        tabProfile.classList.toggle('text-gray-400', isHome);
    }

    tabHome.addEventListener('click', () => showTab('home'));
    tabProfile.addEventListener('click', () => showTab('profile'));

    // Модальное окно
    function openModal(html) {
        modalContent.innerHTML = html;
        modalOverlay.classList.remove('hidden');
        document.querySelectorAll('.toggle-password-btn').forEach(btn => {
            btn.innerHTML = eyeClosedSVG;
        });
    }
    function closeModal() {
        modalOverlay.classList.add('hidden');
        modalContent.innerHTML = '';
    }
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) closeModal();
    });

    modalContent.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const action = btn.dataset.action;
        if (!action) return;
        e.stopPropagation();
        switch(action) {
            case 'register': showRegisterStep1(); break;
            case 'login': showLoginForm(); break;
            case 'close': closeModal(); break;
            case 'reg-step1-next': handleRegStep1(); break;
            case 'reg-step2-next': handleRegStep2(); break;
            case 'reg-finish': handleRegStep3(); break;
            case 'login-submit': handleLogin(); break;
            case 'back-to-choice': showAuthChoice(); break;
            case 'back-to-step1': showRegisterStep1(); break;
            case 'back-to-step2': showRegisterStep2(); break;
            case 'toggle-password': {
                const wrapper = btn.closest('.relative');
                const input = wrapper?.querySelector('input');
                if (input) {
                    const isPassword = input.type === 'password';
                    input.type = isPassword ? 'text' : 'password';
                    btn.innerHTML = isPassword ? eyeOpenSVG : eyeClosedSVG;
                }
                break;
            }
        }
    });

    const eyeOpenSVG = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`;
    const eyeClosedSVG = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/></svg>`;

    function showAuthChoice() {
        openModal(`
            <h3 class="text-xl font-bold text-white mb-4">Добро пожаловать</h3>
            <div class="space-y-3">
                <button data-action="register" class="w-full py-3 btn-primary text-white rounded-full transition">Зарегистрироваться</button>
                <button data-action="login" class="w-full py-3 btn-login-dark text-white rounded-full transition">Войти</button>
            </div>
            <button data-action="close" class="mt-4 text-gray-400 text-sm underline">Отмена</button>
        `);
    }

    function showRegisterStep1() {
        openModal(`
            <h3 class="text-xl font-bold text-[#b1cfb1] mb-4">Регистрация</h3>
            <div class="space-y-3">
                <input type="email" id="reg-email" placeholder="Электронная почта" class="w-full bg-[#1a2320] border border-gray-700 rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#2d5a3f]">
                <div class="relative">
                    <input type="password" id="reg-password1" placeholder="Пароль" class="w-full bg-[#1a2320] border border-gray-700 rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#2d5a3f] pr-10">
                    <button data-action="toggle-password" type="button" class="toggle-password-btn absolute right-3 top-1/2 -translate-y-1/2 text-[#1e3d2b] hover:text-[#2d5a3f] transition">${eyeClosedSVG}</button>
                </div>
                <div class="relative">
                    <input type="password" id="reg-password2" placeholder="Повторите пароль" class="w-full bg-[#1a2320] border border-gray-700 rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#2d5a3f] pr-10">
                    <button data-action="toggle-password" type="button" class="toggle-password-btn absolute right-3 top-1/2 -translate-y-1/2 text-[#1e3d2b] hover:text-[#2d5a3f] transition">${eyeClosedSVG}</button>
                </div>
                <button data-action="reg-step1-next" class="w-full py-3 btn-primary text-white rounded-full transition">Далее</button>
            </div>
            <button data-action="back-to-choice" class="mt-3 text-gray-400 text-sm underline">Назад</button>
        `);
    }

    function handleRegStep1() {
        const email = $('#reg-email')?.value.trim();
        const p1 = $('#reg-password1')?.value;
        const p2 = $('#reg-password2')?.value;
        if (!email || !p1 || !p2) { alert('Заполните все поля.'); return; }
        if (p1 !== p2) { alert('Пароли не совпадают.'); return; }
        if (users.some(u => u.email === email)) { alert('Пользователь с такой почтой уже существует.'); return; }
        modalContent.dataset.regEmail = email;
        modalContent.dataset.regPassword = p1;
        showRegisterStep2();
    }

    function showRegisterStep2() {
        openModal(`
            <h3 class="text-xl font-bold text-[#b1cfb1] mb-4">Придумайте тег</h3>
            <p class="text-xs text-gray-400 mb-3">Уникальный набор латинских букв и цифр.</p>
            <input type="text" id="reg-username" placeholder="например, nightwolf" class="w-full bg-[#1a2320] border border-gray-700 rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#2d5a3f]">
            <button data-action="reg-step2-next" class="w-full py-3 mt-4 btn-primary text-white rounded-full transition">Далее</button>
            <button data-action="back-to-step1" class="mt-3 text-gray-400 text-sm underline">Назад</button>
        `);
    }

    function handleRegStep2() {
        const username = $('#reg-username')?.value.trim();
        if (!/^[a-zA-Z0-9]+$/.test(username)) { alert('Только латинские буквы и цифры.'); return; }
        if (users.some(u => u.username === username)) { alert('Этот тег уже занят.'); return; }
        modalContent.dataset.regUsername = username;
        showRegisterStep3();
    }

    function showRegisterStep3() {
        openModal(`
            <h3 class="text-xl font-bold text-[#b1cfb1] mb-4">Ваше имя</h3>
            <input type="text" id="reg-displayname" placeholder="Как к вам обращаться" class="w-full bg-[#1a2320] border border-gray-700 rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#2d5a3f]">
            <button data-action="reg-finish" class="w-full py-3 mt-4 btn-primary text-white rounded-full transition">Завершить</button>
            <button data-action="back-to-step2" class="mt-3 text-gray-400 text-sm underline">Назад</button>
        `);
    }

    function handleRegStep3() {
        const displayName = $('#reg-displayname')?.value.trim();
        if (!displayName) { alert('Введите имя.'); return; }
        const newUser = {
            email: modalContent.dataset.regEmail,
            password: modalContent.dataset.regPassword,
            username: modalContent.dataset.regUsername,
            displayName: displayName
        };
        users.push(newUser);
        saveUsers();
        currentUser = newUser;
        saveCurrentUser();
        closeModal();
        updateAllUI();
        showTab('profile');
    }

    function showLoginForm() {
        openModal(`
            <h3 class="text-xl font-bold text-[#b1cfb1] mb-4">Вход</h3>
            <input type="email" id="login-email" placeholder="Почта" class="w-full bg-[#1a2320] border border-gray-700 rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#2d5a3f] mb-3">
            <div class="relative mb-4">
                <input type="password" id="login-password" placeholder="Пароль" class="w-full bg-[#1a2320] border border-gray-700 rounded-xl px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#2d5a3f] pr-10">
                <button data-action="toggle-password" type="button" class="toggle-password-btn absolute right-3 top-1/2 -translate-y-1/2 text-[#1e3d2b] hover:text-[#2d5a3f] transition">${eyeClosedSVG}</button>
            </div>
            <button data-action="login-submit" class="w-full py-3 btn-primary text-white rounded-full transition">Войти</button>
            <button data-action="back-to-choice" class="mt-3 text-gray-400 text-sm underline">Назад</button>
        `);
    }

    function handleLogin() {
        const email = $('#login-email')?.value.trim();
        const password = $('#login-password')?.value;
        const user = users.find(u => u.email === email && u.password === password);
        if (!user) { alert('Неверная почта или пароль.'); return; }
        currentUser = user;
        saveCurrentUser();
        closeModal();
        updateAllUI();
        showTab('profile');
    }

    $('#profile-auth-btn').addEventListener('click', showAuthChoice);
    $('#logout-btn').addEventListener('click', () => {
        if (confirm('Выйти из профиля?')) {
            currentUser = null;
            saveCurrentUser();
            updateAllUI();
            showTab('home');
        }
    });

    updateAllUI();
    showTab('home');
})();
</script>
</body>
</html>
